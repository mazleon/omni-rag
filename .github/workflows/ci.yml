name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: |
          PY_FILES=$(find . -name "*.py" -not -path "./.git/*" 2>/dev/null | head -1)
          if [ -z "$PY_FILES" ]; then
            echo "No Python files found — skipping ruff (scaffold phase)"
          else
            ruff check .
          fi

      - name: Run ruff format check
        run: |
          PY_FILES=$(find . -name "*.py" -not -path "./.git/*" 2>/dev/null | head -1)
          if [ -z "$PY_FILES" ]; then
            echo "No Python files found — skipping ruff format check (scaffold phase)"
          else
            ruff format --check .
          fi

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r requirements-dev.txt 2>/dev/null || true

      - name: Run mypy (skip if no Python source files yet)
        run: |
          PY_FILES=$(find apps/ services/ core/ -name "*.py" 2>/dev/null | head -1)
          if [ -z "$PY_FILES" ]; then
            echo "No Python source files found — skipping mypy (scaffold phase)"
          else
            mypy apps/ services/ core/ --ignore-missing-imports
          fi

  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install -r requirements-dev.txt 2>/dev/null || true

      - name: Run unit tests
        run: |
          # Exit code 5 = no tests collected (scaffold phase); treat as success
          pytest tests/unit/ -v --tb=short --cov=apps --cov=services --cov=core --cov-report=xml \
            || { code=$?; [ $code -eq 5 ] && echo "No tests collected yet — OK" && exit 0 || exit $code; }

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  frontend-check:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend exists
        id: frontend-exists
        run: test -f package.json && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.frontend-exists.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        if: steps.frontend-exists.outputs.exists == 'true'
        run: npm ci

      - name: Type check
        if: steps.frontend-exists.outputs.exists == 'true'
        run: npm run type-check 2>/dev/null || npx tsc --noEmit

      - name: Build
        if: steps.frontend-exists.outputs.exists == 'true'
        run: npm run build
