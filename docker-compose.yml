services:
  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://omnirag:omnirag@postgres:5432/omnirag
      - DATABASE_URL=postgresql://omnirag:omnirag@postgres:5432/omnirag
      - DIRECT_URL=postgresql://omnirag:omnirag@postgres:5432/omnirag
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./apps/api:/app/apps/api
      - ./services:/app/services
      - ./core:/app/core

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      - POSTGRES_URL=postgresql+asyncpg://omnirag:omnirag@postgres:5432/omnirag
      - DATABASE_URL=postgresql://omnirag:omnirag@postgres:5432/omnirag
      - DIRECT_URL=postgresql://omnirag:omnirag@postgres:5432/omnirag
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./services:/app/services
      - ./core:/app/core

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: omnirag
      POSTGRES_PASSWORD: omnirag
      POSTGRES_DB: omnirag
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnirag -d omnirag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    # healthcheck temporarily disabled
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ClickHouse ─────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/v1
    depends_on:
      - api
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

  # ── Jaeger (OTEL traces local) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  qdrant_storage:
  redis_data:
  clickhouse_data:
